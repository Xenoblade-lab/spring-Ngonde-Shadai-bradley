<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{nav.candidats}">Candidat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="page-header" th:text="${id} != null ? #{action.edit} : #{action.new}">Formulaire</h1>
    <form th:action="@{/candidats/save}" th:object="${form}" method="post" class="card card-body">
        <input type="hidden" name="id" th:value="${id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.profession}">Profession</label>
            <select class="form-select" th:field="*{professionPk}">
                <option th:each="p : ${professions}" th:value="${p.id}" th:text="${p.description}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('professionPk')}" th:errors="*{professionPk}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.noms}">Noms</label>
            <input class="form-control" th:field="*{noms}" maxlength="100"/>
            <div class="form-error" th:if="${#fields.hasErrors('noms')}" th:errors="*{noms}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.genre}">Genre</label>
            <select class="form-select" th:field="*{genre}">
                <option value="M">M</option>
                <option value="F">F</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.etatCivil}">État civil</label>
            <input class="form-control" th:field="*{etatCivil}" maxlength="20"/>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.lieuNais}">Lieu naissance</label>
            <input class="form-control" th:field="*{lieuNais}" maxlength="45"/>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.dateNais}">Date naissance</label>
            <input class="form-control" type="date" th:field="*{dateNais}"/>
            <div class="form-error" th:if="${#fields.hasErrors('dateNais')}" th:errors="*{dateNais}"></div>
        </div>
        <div>
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/candidats}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
</body>
</html>
