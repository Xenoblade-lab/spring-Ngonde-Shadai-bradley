<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}" th:text="#{app.title}">App</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" th:href="@{/}" th:text="#{nav.home}">Home</a>
            <a class="nav-link" th:href="@{/professions}" th:text="#{nav.professions}">Professions</a>
            <a class="nav-link" th:href="@{/candidats}" th:text="#{nav.candidats}">Candidats</a>
            <a class="nav-link" th:href="@{/formations}" th:text="#{nav.formations}">Formations</a>
            <a class="nav-link" th:href="@{/candidats-formations}" th:text="#{nav.inscriptions}">Inscriptions</a>
        </div>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{''(locale='fr')}" th:text="#{lang.fr}">FR</a>
            <a class="nav-link" th:href="@{''(locale='en')}" th:text="#{lang.en}">EN</a>
        </div>
    </div>
</nav>

<main class="container pb-5">
    <div th:if="${message}" class="alert alert-success flash-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger flash-error" th:text="${error}"></div>
    <div th:replace="${content}">Content</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
