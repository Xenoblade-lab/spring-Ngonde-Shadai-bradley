<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{nav.inscriptions}">Inscriptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center page-header">
        <h1 th:text="#{nav.inscriptions}">Inscriptions</h1>
        <a class="btn btn-primary" th:href="@{/candidats-formations/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th th:text="#{label.id}">Id</th>
            <th th:text="#{label.candidat}">Candidat</th>
            <th th:text="#{label.formation}">Formation</th>
            <th th:text="#{label.duree}">Durée</th>
            <th th:text="#{label.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
            <td th:text="${row.id}">1</td>
            <td th:text="${row.candidat != null ? row.candidat.noms : ''}">Candidat</td>
            <td th:text="${row.formation != null ? row.formation.description : ''}">Formation</td>
            <td th:text="${row.formation != null ? row.formation.duree : ''}">3</td>
            <td class="table-actions">
                <a th:href="@{/candidats-formations/{id}/delete(id=${row.id})}" th:text="#{action.delete}"
                   th:data-confirm="#{confirm.delete}" onclick="return confirm(this.dataset.confirm);">Supprimer</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(rows)}">
            <td colspan="5" th:text="#{empty}">Aucune donnée</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
