<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.inscriptions})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 page-header">
        <h1 th:text="#{nav.inscriptions}">Inscriptions</h1>
        <a class="btn btn-primary" th:href="@{/candidats-formations/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th th:text="#{label.id}">Id</th>
                <th th:text="#{label.candidat}">Candidat</th>
                <th th:text="#{label.formation}">Formation</th>
                <th th:text="#{label.duree}">Durée</th>
                <th th:text="#{label.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}">1</td>
                <td th:text="${row.candidat != null ? row.candidat.noms : ''}">Candidat</td>
                <td th:text="${row.formation != null ? row.formation.description : ''}">Formation</td>
                <td th:text="${row.formation != null ? row.formation.duree : ''}">3</td>
                <td th:replace="~{fragments/table-actions :: cell(null, @{/candidats-formations/{id}/delete(id=${row.id})})}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="5" th:text="#{empty}">Aucune donnée</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
