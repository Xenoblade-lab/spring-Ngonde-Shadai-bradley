<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{nav.candidats}">Candidats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center page-header">
        <h1 th:text="#{nav.candidats}">Candidats</h1>
        <a class="btn btn-primary" th:href="@{/candidats/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <form class="row g-2 mb-3" method="get" th:action="@{/candidats}">
        <div class="col-md-8">
            <input class="form-control" type="search" name="keyword" th:value="${keyword}" th:placeholder="#{keyword}"/>
        </div>
        <div class="col-md-4">
            <button class="btn btn-outline-primary" type="submit" th:text="#{action.search}">Rechercher</button>
        </div>
    </form>
    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th th:text="#{label.id}">Id</th>
            <th th:text="#{label.noms}">Noms</th>
            <th th:text="#{label.profession}">Profession</th>
            <th th:text="#{label.genre}">Genre</th>
            <th th:text="#{label.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
            <td th:text="${row.id}">1</td>
            <td th:text="${row.noms}">Noms</td>
            <td th:text="${row.profession != null ? row.profession.description : ''}">Profession</td>
            <td th:text="${row.genre}">M</td>
            <td th:replace="~{fragments/table-actions :: cell(@{/candidats/{id}/edit(id=${row.id})}, @{/candidats/{id}/delete(id=${row.id})})}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(rows)}">
            <td colspan="5" th:text="#{empty}">Aucune donnée</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
