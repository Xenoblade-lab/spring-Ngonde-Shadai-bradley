<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.home})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="page-header">
        <h1 th:text="#{home.welcome}">Bienvenue</h1>
        <p class="text-muted mb-0" th:text="#{home.subtitle}">Sous-titre</p>
    </div>
    <div class="row g-3">
        <div class="col-12 col-sm-6 col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/professions(locale=${navLocaleCode})}" th:text="#{nav.professions}">Professions</a>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/candidats(locale=${navLocaleCode})}" th:text="#{nav.candidats}">Candidats</a>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/formations(locale=${navLocaleCode})}" th:text="#{nav.formations}">Formations</a>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/candidats-formations(locale=${navLocaleCode})}" th:text="#{nav.inscriptions}">Inscriptions</a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
