<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{nav.home}">Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="page-header">
        <h1 th:text="#{home.welcome}">Bienvenue</h1>
        <p class="text-muted" th:text="#{home.subtitle}">Sous-titre</p>
    </div>
    <div class="row g-3">
        <div class="col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/professions}" th:text="#{nav.professions}">Professions</a>
        </div>
        <div class="col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/candidats}" th:text="#{nav.candidats}">Candidats</a>
        </div>
        <div class="col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/formations}" th:text="#{nav.formations}">Formations</a>
        </div>
        <div class="col-md-3">
            <a class="btn btn-outline-primary w-100" th:href="@{/candidats-formations}" th:text="#{nav.inscriptions}">Inscriptions</a>
        </div>
    </div>
</main>
</body>
</html>
