<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{nav.inscriptions}">Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="page-header" th:text="#{action.new}">Nouvelle inscription</h1>
    <form th:action="@{/candidats-formations/save}" th:object="${form}" method="post" class="card card-body">
        <div class="mb-3">
            <label class="form-label" th:text="#{label.candidat}">Candidat</label>
            <select class="form-select" th:field="*{candidatPk}">
                <option th:each="c : ${candidats}" th:value="${c.id}" th:text="${c.noms}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('candidatPk')}" th:errors="*{candidatPk}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.formation}">Formation</label>
            <select class="form-select" th:field="*{formationPk}">
                <option th:each="f : ${formations}" th:value="${f.id}"
                        th:text="${f.description + ' (' + f.duree + ')'}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('formationPk')}" th:errors="*{formationPk}"></div>
        </div>
        <div>
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/candidats-formations}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
</body>
</html>
